services:
  # Database Service
  db:
    image: mysql:8.0
    container_name: cloud_storage_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cloud_storage
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # MinIO Object Storage Service
  minio:
    image: minio/minio
    container_name: cloud_storage_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  # Backend Service (Spring Boot)
  backend:
    build: ./backend
    container_name: cloud_storage_backend
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/cloud_storage
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpassword
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: cloud-files
    depends_on:
      - db
      - minio

  # Frontend Service (React)
  frontend:
    build: ./frontend
    container_name: cloud_storage_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  db_data:
  minio_data:
